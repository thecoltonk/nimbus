services:
  kira:
    build: .
    ports:
      - 3000
    env_file: .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kira.rule=Host(`kira.adityan.dev`)"
      - "traefik.http.routers.kira.entrypoints=websecure"
      - "traefik.http.routers.kira.tls=true"
      - "traefik.http.routers.kira.tls.certresolver=letsencrypt"
      - "traefik.http.routers.kira.middlewares=authelia@docker"
      - "traefik.http.services.kira.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
